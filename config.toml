baseURL = "https://etiennetack.github.io/"
languageCode = "en-nz"
title = "Etienne Tack"
theme = "PaperMod"
paginate = 5

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
pygmentsUseClasses = true
enableEmoji = true

[minify]
disableXML = true
minifyOutput = true

[params]
env = "production"
title = "Etienne Tack"
description = "Description"
keywords = ["Research"]
author = "Etienne Tack"
# author: ["Me", "You"]  # multiple authors
DateFormat = "January 2, 2006"
defaultTheme = "auto"  # dark, light
disableThemeToggle = false

ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = false
ShowWordCount = true
ShowRssButtonInSectionTermList = true
UseHugoToc = true
disableSpecial1stPost = false
disableScrollToTop = false
comments = false
hidemeta = false
hideSummary = false
ShowToc = true
tocopen = false

[params.assets]
# disableHLJS = true # to disable highlight.js
# disableFingerprinting = true
favicon = "<link / abs url>"
favicon16x16 = "<link / abs url>"
favicon32x32 = "<link / abs url>"
apple_touch_icon = "<link / abs url>"
safari_pinned_tab = "<link / abs url>"

[params.label]
text = "Etienne Tack"
# icon = "/apple-touch-icon.png"
iconHeight = 35

[params.profileMode]
enabled = true
title = "Etienne Tack"
subtitle = """
PhD computer science student at the UNC and INSIGHT NC,\n
specialized in agent based systems and data science
"""
# imageUrl = "<img location>"
# imageWidth = 120
# imageHeight = 120
imageTitle = "my image"

[[params.profileMode.buttons]]
name = "About Me"
url = "about"

# [[params.profileMode.buttons]]
# name = "Posts"
# url = "posts"

# [[params.profileMode.buttons]]
# name = "Tags"
# url = "tags"

[[params.socialIcons]]
name = "email"
url = "mailto:Etienne Tack <e.tack@insight.nc>"

[[params.socialIcons]]
name = "github"
url = "https://github.com/etiennetack"

[[params.socialIcons]]
name = "researchgate"
url = "https://www.researchgate.net/profile/Etienne-Tack"

[[params.socialIcons]]
name = "orcid"
url = "https://orcid.org/0000-0003-4131-1449"

[[params.socialIcons]]
name = "rss"
url= "/index.xml"

[params.cover]
hidden = true  # hide everywhere but not in structured data
hiddenInList = true  # hide on list pages and home
hiddenInSingle = true  # hide on single page

[params.editPost]
URL = "https://github.com/etiennetack/etiennetack.github.io/content"
Text = "Suggest Changes"
appendFilePath = true  # to append file path to Edit link

# for search
# https://fusejs.io/api/options.html
[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 0
keys = ["title", "permalink", "summary", "content"]

[outputs]
home = ["HTML", "RSS", "JSON"]

